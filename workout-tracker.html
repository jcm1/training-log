<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Training Log</title>
<meta name="theme-color" content="#13161b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#13161b;
    --surface:#1a1e25;
    --surface-2:#232833;
    --line:#2d333e;
    --line-soft:#242a33;
    --text:#e7e9ed;
    --muted:#8a929f;
    --muted-2:#5f6773;
    --heat:#ff6a2b;
    --heat-bright:#ff9a3d;
    --heat-deep:#d8460f;
    --heat-glow:rgba(255,106,43,.32);
    --font-display:'Oswald',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--font-sans);}
  body{min-height:100vh;padding-bottom:150px;}
  .wrap{max-width:480px;margin:0 auto;}

  .app-header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,rgba(19,22,27,.97),rgba(19,22,27,.86));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 16px 13px;}
  .eyebrow{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);}
  .day-tabs{display:flex;gap:8px;margin-top:11px;}
  .tab{flex:1;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.04em;font-weight:600;font-size:14px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 0;cursor:pointer;transition:transform .15s,background .18s,color .18s,box-shadow .18s,border-color .18s;}
  .tab:active{transform:scale(.97);}
  .tab.active{color:#1a1208;background:linear-gradient(180deg,var(--heat-bright),var(--heat));border-color:var(--heat-deep);box-shadow:0 4px 14px var(--heat-glow);}
  .day-meta{display:flex;justify-content:space-between;align-items:baseline;margin-top:13px;gap:12px;}
  .day-focus{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.03em;font-weight:600;font-size:19px;line-height:1;}
  .set-count{font-family:var(--font-mono);font-size:12.5px;color:var(--muted);white-space:nowrap;}
  .progress{height:6px;background:var(--surface-2);border-radius:99px;margin-top:9px;overflow:hidden;}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--heat-deep),var(--heat-bright));border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1);}

  .list{padding:14px 16px 6px;display:flex;flex-direction:column;gap:12px;}
  .exercise{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;transition:background .2s,border-color .2s;}
  .exercise.done{border-color:var(--heat-deep);background:linear-gradient(180deg,rgba(255,106,43,.07),var(--surface));}
  .ex-top{display:flex;gap:12px;align-items:flex-start;}
  .ex-num{font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);min-width:34px;height:30px;padding:0 4px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;}
  .exercise.done .ex-num{color:var(--heat-bright);border-color:var(--heat-deep);background:rgba(255,106,43,.08);}
  .ex-main{flex:1;min-width:0;}
  .ex-name{font-family:var(--font-display);text-transform:uppercase;font-weight:600;font-size:17px;letter-spacing:.02em;line-height:1.15;}
  .ex-sub{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:4px;}
  .dot-sep{margin:0 6px;color:var(--muted-2);}
  .ex-note{font-size:12px;color:var(--muted-2);margin-top:6px;font-style:italic;line-height:1.4;}

  .sets{display:flex;flex-wrap:wrap;gap:9px;margin-top:13px;}
  .set-dot{width:50px;height:50px;border-radius:13px;border:1.5px solid var(--line);background:var(--surface-2);color:var(--muted);font-family:var(--font-mono);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s,background .18s,color .18s,border-color .18s,box-shadow .18s;}
  .set-dot:active{transform:scale(.9);}
  .set-dot.done{background:linear-gradient(180deg,var(--heat-bright),var(--heat));color:#1a1208;border-color:var(--heat-deep);box-shadow:0 3px 12px var(--heat-glow);}

  .weight-row{display:flex;align-items:center;gap:10px;margin-top:13px;padding-top:12px;border-top:1px solid var(--line-soft);}
  .weight-label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted-2);}
  .weight{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;color:var(--text);font-family:var(--font-mono);font-size:14px;padding:10px 11px;outline:none;transition:border-color .18s;min-width:0;}
  .weight::placeholder{color:var(--muted-2);}
  .weight:focus{border-color:var(--heat);}

  .ss-group{border:1px dashed var(--line);border-left:3px solid var(--heat-deep);border-radius:14px;padding:11px;display:flex;flex-direction:column;gap:11px;background:rgba(255,106,43,.025);}
  .ss-tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--heat-bright);}
  .ss-group .exercise{background:var(--surface-2);border:1px solid var(--line-soft);border-radius:11px;}
  .ss-group .exercise.done{background:linear-gradient(180deg,rgba(255,106,43,.08),var(--surface-2));border-color:var(--heat-deep);}
  .ss-group .ex-num{background:var(--surface);}

  .footer{padding:10px 16px 34px;display:flex;flex-direction:column;gap:12px;align-items:center;}
  .reset-btn{font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:9px;padding:11px 20px;cursor:pointer;transition:transform .15s,color .18s,border-color .18s;}
  .reset-btn:active{transform:scale(.97);}
  .reset-btn.armed{color:var(--heat-bright);border-color:var(--heat-deep);}
  .foot-note{font-size:11px;color:var(--muted-2);text-align:center;line-height:1.55;max-width:320px;}

  .rest-bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(150%);width:calc(100% - 24px);max-width:456px;background:rgba(35,40,51,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px;padding:13px 14px;z-index:20;box-shadow:0 10px 34px rgba(0,0,0,.55);transition:transform .3s cubic-bezier(.34,1.28,.64,1);}
  .rest-bar.show{transform:translateX(-50%) translateY(0);}
  .rest-info{display:flex;justify-content:space-between;align-items:baseline;}
  .rest-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;color:var(--heat-bright);transition:color .2s;}
  .rest-name{font-family:var(--font-mono);font-size:11px;color:var(--muted);max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;}
  .rest-time{font-family:var(--font-mono);font-size:30px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.1;margin-top:2px;}
  .rest-bar.done .rest-time{color:var(--heat-bright);}
  .rest-track{height:5px;background:var(--bg);border-radius:99px;margin:8px 0 12px;overflow:hidden;}
  .rest-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--heat-deep),var(--heat-bright));border-radius:99px;transition:width 1s linear;}
  .rest-actions{display:flex;gap:9px;}
  .rest-btn{flex:1;font-family:var(--font-display);text-transform:uppercase;letter-spacing:.05em;font-weight:600;font-size:14px;padding:11px 0;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--text);transition:transform .15s,background .18s;}
  .rest-btn:active{transform:scale(.97);}
  .rest-btn.primary{background:linear-gradient(180deg,var(--heat-bright),var(--heat));color:#1a1208;border-color:var(--heat-deep);}

  button:focus-visible,input:focus-visible{outline:2px solid var(--heat-bright);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="app-header">
    <div class="eyebrow">Full-Body Hypertrophy · Swim-Complement</div>
    <div class="day-tabs">
      <button class="tab" data-day="1">Day 1</button>
      <button class="tab" data-day="2">Day 2</button>
      <button class="tab" data-day="3">Day 3</button>
    </div>
    <div class="day-meta">
      <div class="day-focus" id="dayFocus">Squat Focus</div>
      <div class="set-count" id="setCount">0 / 0 sets</div>
    </div>
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
  </header>

  <main class="list" id="list"></main>

  <div class="footer">
    <button class="reset-btn" id="resetBtn">Reset sets</button>
    <div class="foot-note">Sets and weights save automatically. Reset clears the ticks for a fresh session but keeps your logged weights.</div>
  </div>
</div>

<div class="rest-bar" id="restBar" aria-live="polite">
  <div class="rest-info">
    <span class="rest-label" id="restLabel">Rest</span>
    <span class="rest-name" id="restName"></span>
  </div>
  <div class="rest-time" id="restTime">0:00</div>
  <div class="rest-track"><div class="rest-fill" id="restFill"></div></div>
  <div class="rest-actions">
    <button class="rest-btn" id="addRest">+30s</button>
    <button class="rest-btn primary" id="skipRest">Skip</button>
  </div>
</div>

<script>
"use strict";

const DATA = [
  { focus: "Squat Focus", ex: [
    { id:"d1e1", n:"1",  name:"Back Squat",                         sets:4, reps:"5–8",   rest:180 },
    { id:"d1e2", n:"2",  name:"Incline DB or Barbell Press",        sets:4, reps:"8–10",  rest:120 },
    { id:"d1e9", n:"3",  name:"Machine Chest Press",                sets:3, reps:"8–12",  rest:90, note:"or Weighted Dips if shoulders feel good" },
    { id:"d1e3", n:"4",  name:"Chest-Supported Row",                sets:4, reps:"8–12",  rest:120 },
    { id:"d1e4", n:"5",  name:"Seated Leg Curl",                    sets:3, reps:"10–12", rest:90  },
    { id:"d1e5", n:"6A", name:"Lateral Raise",                      sets:4, reps:"12–20", rest:60, group:"d1g5" },
    { id:"d1e6", n:"6B", name:"Face Pull",                          sets:4, reps:"15–20", rest:60, group:"d1g5" },
    { id:"d1e7", n:"7",  name:"Cable Triceps Pushdown",             sets:3, reps:"10–15", rest:75  },
    { id:"d1e8", n:"8",  name:"Standing Calf Raise",                sets:3, reps:"8–12",  rest:90  }
  ]},
  { focus: "Hinge Focus", ex: [
    { id:"d2e1", n:"1",  name:"Trap-Bar Deadlift",                  sets:4, reps:"4–6",      rest:180, note:"Sub Hip Thrust if recovery is tight" },
    { id:"d2e2", n:"2",  name:"Weighted Pull-Up or Lat Pulldown",   sets:4, reps:"6–10",     rest:120 },
    { id:"d2e8", n:"3",  name:"Incline DB Press",                   sets:3, reps:"8–12",     rest:120 },
    { id:"d2e3", n:"4",  name:"Seated DB Shoulder Press",           sets:3, reps:"8–10",     rest:120, note:"Drop a set if shoulders feel beat up" },
    { id:"d2e4", n:"5",  name:"Bulgarian Split Squat",              sets:3, reps:"8–10 / leg", rest:90 },
    { id:"d2e5", n:"6A", name:"Incline DB Curl",                    sets:3, reps:"8–12",     rest:60, group:"d2g5" },
    { id:"d2e6", n:"6B", name:"Lateral Raise",                      sets:3, reps:"12–20",    rest:60, group:"d2g5" },
    { id:"d2e7", n:"7",  name:"Hanging Leg Raise",                  sets:3, reps:"10–15",    rest:75 }
  ]},
  { focus: "Quads + Arms", ex: [
    { id:"d3e1", n:"1",  name:"Hack Squat or Leg Press",            sets:4, reps:"10–12", rest:150 },
    { id:"d3e2", n:"2",  name:"Flat DB Press",                      sets:4, reps:"8–12",  rest:120 },
    { id:"d3e3", n:"3",  name:"Single-Arm DB Row",                  sets:4, reps:"8–12",  rest:120 },
    { id:"d3e4", n:"4",  name:"Romanian Deadlift",                  sets:3, reps:"8–10",  rest:120 },
    { id:"d3e5", n:"5A", name:"Cable Fly",                          sets:3, reps:"12–15", rest:60, group:"d3g5" },
    { id:"d3e6", n:"5B", name:"Rear Delt Fly",                      sets:3, reps:"15–20", rest:60, group:"d3g5" },
    { id:"d3e7", n:"6A", name:"EZ-Bar or Cable Curl",               sets:3, reps:"10–12", rest:75, group:"d3g6" },
    { id:"d3e8", n:"6B", name:"Overhead Cable Triceps Extension",   sets:3, reps:"10–15", rest:75, group:"d3g6" },
    { id:"d3e9", n:"7",  name:"Seated Calf Raise",                  sets:3, reps:"10–15", rest:75 }
  ]}
];

const state = {};          // { 1:{sets:{},weights:{}}, ... }
const saveTimers = {};
let activeDay = 0;

const $ = (id) => document.getElementById(id);
const listEl = $("list");

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function formatRest(s){ if(s % 60 === 0) return (s/60)+" min"; if(s === 150) return "2.5 min"; return s+" s"; }
function formatTime(s){ const m = Math.floor(s/60); const r = s % 60; return m+":"+(r<10?"0":"")+r; }

/* ---------- storage (Claude cloud storage if present, else on-device localStorage) ---------- */
const STORE_PREFIX = "gym-day-";
function hasCloud(){ return typeof window !== "undefined" && window.storage && typeof window.storage.get === "function"; }
async function storageGet(day){
  if(hasCloud()){
    try{ const r = await window.storage.get(STORE_PREFIX+day); return (r && r.value) ? r.value : null; }
    catch(e){ return null; }
  }
  try{ return localStorage.getItem(STORE_PREFIX+day); }catch(e){ return null; }
}
async function storageSet(day, value){
  if(hasCloud()){
    try{ await window.storage.set(STORE_PREFIX+day, value); return; }catch(e){ console.error("Save failed", e); }
  }
  try{ localStorage.setItem(STORE_PREFIX+day, value); }catch(e){ console.error("Save failed", e); }
}
async function loadDay(day){
  if(state[day]) return state[day];
  let data = { sets:{}, weights:{} };
  const raw = await storageGet(day);
  if(raw){
    try{ const p = JSON.parse(raw); data = { sets: p.sets || {}, weights: p.weights || {} }; }
    catch(e){ /* parse error -> default */ }
  }
  state[day] = data;
  return data;
}
function scheduleSave(day){
  if(saveTimers[day]) clearTimeout(saveTimers[day]);
  saveTimers[day] = setTimeout(() => doSave(day), 400);
}
async function doSave(day){
  saveTimers[day] = null;
  if(!state[day]) return;
  await storageSet(day, JSON.stringify(state[day]));
}
async function flushSave(day){
  if(saveTimers[day]){ clearTimeout(saveTimers[day]); saveTimers[day] = null; }
  await doSave(day);
}

/* ---------- render ---------- */
function exerciseHTML(ex, st){
  const grouped = ex.group ? 1 : 0;
  let allDone = ex.sets > 0;
  let dots = "";
  for(let i=0;i<ex.sets;i++){
    const isDone = !!st.sets[ex.id+"-"+i];
    if(!isDone) allDone = false;
    dots += '<button class="set-dot'+(isDone?" done":"")+'" data-key="'+ex.id+"-"+i+'" data-ex="'+ex.id+'" data-set="'+i+'" data-rest="'+ex.rest+'" data-grouped="'+grouped+'" data-name="'+esc(ex.name)+'" aria-label="'+esc(ex.name)+' set '+(i+1)+'">'+(i+1)+'</button>';
  }
  const w = st.weights[ex.id] ? esc(st.weights[ex.id]) : "";
  const note = ex.note ? '<div class="ex-note">'+esc(ex.note)+'</div>' : "";
  return '<div class="exercise'+(allDone?" done":"")+'" id="ex-'+ex.id+'">'
    + '<div class="ex-top">'
    +   '<div class="ex-num">'+ex.n+'</div>'
    +   '<div class="ex-main">'
    +     '<div class="ex-name">'+esc(ex.name)+'</div>'
    +     '<div class="ex-sub">'+ex.sets+' × '+ex.reps+'<span class="dot-sep">·</span>'+formatRest(ex.rest)+' rest</div>'
    +     note
    +   '</div>'
    + '</div>'
    + '<div class="sets">'+dots+'</div>'
    + '<div class="weight-row">'
    +   '<span class="weight-label">Weight</span>'
    +   '<input class="weight" type="text" placeholder="kg / notes" value="'+w+'" data-ex="'+ex.id+'" aria-label="'+esc(ex.name)+' weight">'
    + '</div>'
    + '</div>';
}

function renderDay(day){
  const d = DATA[day-1];
  const st = state[day];
  $("dayFocus").textContent = d.focus;
  let html = "";
  let curGroup = null;
  d.ex.forEach((ex) => {
    const g = ex.group || null;
    if(g !== curGroup){
      if(curGroup) html += "</div>";
      if(g) html += '<div class="ss-group"><div class="ss-tag">Superset — alternate A / B</div>';
      curGroup = g;
    }
    html += exerciseHTML(ex, st);
  });
  if(curGroup) html += "</div>";
  listEl.innerHTML = html;
  updateProgress();
}

function updateProgress(){
  const d = DATA[activeDay-1];
  const st = state[activeDay];
  let total = 0, done = 0;
  d.ex.forEach((ex) => {
    total += ex.sets;
    for(let i=0;i<ex.sets;i++){ if(st.sets[ex.id+"-"+i]) done++; }
  });
  const pct = total ? (done/total*100) : 0;
  $("progressFill").style.width = pct + "%";
  $("setCount").textContent = done + " / " + total + " sets";
}

function updateExerciseDone(exId){
  const ex = DATA[activeDay-1].ex.find((e) => e.id === exId);
  if(!ex) return;
  const st = state[activeDay];
  let allDone = ex.sets > 0;
  for(let i=0;i<ex.sets;i++){ if(!st.sets[exId+"-"+i]){ allDone = false; break; } }
  const card = $("ex-"+exId);
  if(card) card.classList.toggle("done", allDone);
}

/* ---------- interactions ---------- */
function onListClick(e){
  const dot = e.target.closest(".set-dot");
  if(!dot) return;
  const key = dot.dataset.key;
  const exId = dot.dataset.ex;
  const st = state[activeDay];
  const nowDone = !st.sets[key];
  if(nowDone) st.sets[key] = true; else delete st.sets[key];
  dot.classList.toggle("done", nowDone);
  updateExerciseDone(exId);
  updateProgress();
  scheduleSave(activeDay);
  if(nowDone && dot.dataset.grouped !== "1"){
    startRest(parseInt(dot.dataset.rest, 10), dot.dataset.name);
  }
}

function onListInput(e){
  const inp = e.target.closest(".weight");
  if(!inp) return;
  state[activeDay].weights[inp.dataset.ex] = inp.value;
  scheduleSave(activeDay);
}

async function switchDay(day){
  if(activeDay) await flushSave(activeDay);
  stopRest();
  activeDay = day;
  document.querySelectorAll(".tab").forEach((t) => {
    t.classList.toggle("active", parseInt(t.dataset.day, 10) === day);
  });
  await loadDay(day);
  renderDay(day);
  window.scrollTo({ top: 0, behavior: "auto" });
}

/* ---------- reset (two-tap confirm) ---------- */
let resetArmed = false, resetTimer = null;
function onReset(){
  const btn = $("resetBtn");
  if(!resetArmed){
    resetArmed = true;
    btn.textContent = "Tap again to clear";
    btn.classList.add("armed");
    resetTimer = setTimeout(() => {
      resetArmed = false;
      btn.textContent = "Reset sets";
      btn.classList.remove("armed");
    }, 3000);
    return;
  }
  clearTimeout(resetTimer);
  resetArmed = false;
  btn.textContent = "Reset sets";
  btn.classList.remove("armed");
  state[activeDay].sets = {};
  scheduleSave(activeDay);
  renderDay(activeDay);
}

/* ---------- rest timer ---------- */
let timer = null, remaining = 0, total = 0;
function startRest(sec, name){
  if(!sec) return;
  total = sec; remaining = sec;
  const bar = $("restBar");
  bar.classList.remove("done");
  bar.classList.add("show");
  $("restLabel").textContent = "Rest";
  $("restName").textContent = name || "";
  updateRestUI();
  if(timer) clearInterval(timer);
  timer = setInterval(tick, 1000);
}
function tick(){
  remaining--;
  if(remaining <= 0){ remaining = 0; updateRestUI(); finishRest(); }
  else updateRestUI();
}
function updateRestUI(){
  $("restTime").textContent = formatTime(remaining);
  const pct = total ? (remaining/total*100) : 0;
  $("restFill").style.width = pct + "%";
}
function finishRest(){
  if(timer){ clearInterval(timer); timer = null; }
  const bar = $("restBar");
  bar.classList.add("done");
  $("restLabel").textContent = "Rest complete";
  if(navigator.vibrate){ try{ navigator.vibrate([130,70,130]); }catch(e){} }
  setTimeout(() => { if(!timer) stopRest(); }, 2600);
}
function addRest(s){
  const bar = $("restBar");
  if(!bar.classList.contains("show")) return;
  remaining += s;
  total = Math.max(total, remaining);
  updateRestUI();
  if(!timer){
    bar.classList.remove("done");
    $("restLabel").textContent = "Rest";
    timer = setInterval(tick, 1000);
  }
}
function stopRest(){
  if(timer){ clearInterval(timer); timer = null; }
  $("restBar").classList.remove("show","done");
}

/* ---------- init ---------- */
(async function init(){
  document.querySelectorAll(".tab").forEach((t) => {
    t.addEventListener("click", () => switchDay(parseInt(t.dataset.day, 10)));
  });
  $("resetBtn").addEventListener("click", onReset);
  $("skipRest").addEventListener("click", stopRest);
  $("addRest").addEventListener("click", () => addRest(30));
  listEl.addEventListener("click", onListClick);
  listEl.addEventListener("input", onListInput);
  await switchDay(1);
})();
</script>
</body>
</html>
